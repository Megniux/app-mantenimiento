<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Consulta de Órdenes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Estilos adicionales específicos para la tabla y filtros -->
    <style>
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .filter-group .grupo-filtro {
            display: flex;
            flex-direction: column;
        }
        .filter-group label {
            font-size: 0.7rem;
            margin-bottom: 2px;
            color: #5a6e8a;
        }
        .filter-group input, .filter-group select {
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            font-size: 12px;
            min-width: 120px;
        }
        .ordenamiento-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .export-btn {
            background: #1f3a5f;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .filter-group .grupo-filtro {
                width: calc(50% - 6px);
            }
            .ordenamiento-controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- Sidebar (idéntica a index) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.jpg" alt="Logo" class="sidebar-logo">
            <h2>Mantenimiento</h2>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
            <!-- Se genera dinámicamente -->
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar"></div>
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-role" id="userRole"></div>
                </div>
            </div>
            <button class="logout-btn-sidebar" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Órdenes de mantenimiento</h1>
            </div>
            <div class="actions-right">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="busqueda" placeholder="Buscar...">
                </div>
                <button class="btn-outline" id="exportBtn"><i class="fas fa-download"></i> Exportar CSV</button>
            </div>
        </div>

        <div class="orders-card">
            <div class="table-toolbar">
                <div class="filter-group">
                    <div class="grupo-filtro">
                        <label>Tipo</label>
                        <select id="filtroTipo">
                            <option value="">Todos</option>
                            <option value="Correctivo">Correctivo</option>
                            <option value="Preventivo">Preventivo</option>
                        </select>
                    </div>
                    <div class="grupo-filtro">
                        <label>Estado</label>
                        <select id="filtroEstado">
                            <option value="">Todos</option>
                            <option value="noCerrado">Todos los no cerrados</option>
                            <option>Nuevo</option>
                            <option>Pendiente</option>
                            <option>En proceso</option>
                            <option>Esperando proveedor</option>
                            <option>Cerrado</option>
                        </select>
                    </div>
                    <div class="grupo-filtro">
                        <label>Solicitante</label>
                        <select id="filtroUsuario">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="grupo-filtro">
                        <label>Ubicación</label>
                        <select id="filtroUbicacion">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div class="grupo-filtro">
                        <label>Equipo</label>
                        <select id="filtroEquipo">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="grupo-filtro">
                        <button class="btn-primary-green" id="filtrarBtn">Filtrar</button>
                    </div>
                </div>
                <div class="ordenamiento-controls">
                    <span>Ordenar por:</span>
                    <select id="ordenCampo">
                        <option value="numero">Número de orden</option>
                        <option value="fechaProgramada">Fecha programada</option>
                    </select>
                    <select id="ordenDireccion">
                        <option value="asc">Ascendente</option>
                        <option value="desc">Descendente</option>
                    </select>
                    <button id="aplicarOrdenBtn">Aplicar</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table class="order-table" id="tablaOrdenes">
                    <thead>
                        <tr><th>N° Orden</th><th>Tipo</th><th>Estado</th><th>Equipo</th><th>Descripción</th><th style="width: 50px;"></th></tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Modales (igual que antes) -->
<div id="modalEditar" class="modal"><div class="modal-content"><span class="close" onclick="cerrarModal('modalEditar')">&times;</span>
    <h3>Editar Orden</h3><input type="hidden" id="editId">
    <div class="form-group"><label>Estado:</label><select id="editEstado"></select></div>
    <div class="form-group"><label>Técnico asignado:</label><select id="editTecnico"></select></div>
    <div class="form-group"><label>Fecha programada:</label><input type="datetime-local" id="editFechaProgramada"></div>
    <div class="form-group"><label>Tiempo estimado (hs):</label><input type="number" step="0.5" id="editTiempoEstimado"></div>
    <div class="form-group"><label>Tiempo real (hs):</label><input type="number" step="0.5" id="editTiempoReal"></div>
    <div class="form-group"><label>Comentario mantenimiento:</label><textarea id="editComentario" rows="2"></textarea></div>
    <div id="divInformeCierre" style="display:none;"><div class="form-group"><label>Informe de cierre (*):</label><textarea id="editInformeCierre" rows="2" required></textarea></div></div>
    <div class="form-group"><button onclick="guardarEdicion()">Guardar cambios</button></div>
    <div id="accionEspera"></div>
</div></div>

<div id="modalDetalles" class="modal"><div class="modal-content"><span class="close" onclick="cerrarModal('modalDetalles')">&times;</span>
    <h3>Detalles de la Orden</h3><div id="detallesContenido"></div>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
        authDomain: "mantenimiento-app-170e5.firebaseapp.com",
        projectId: "mantenimiento-app-170e5",
        storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
        messagingSenderId: "555398253444",
        appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userRole = null;
    let todasOrdenes = [];
    let currentOrderId = null;
    let listaTecnicos = [];

    // ==================== SIDEBAR ====================
    function generarSidebar(role) {
        const nav = document.getElementById("sidebar-nav");
        nav.innerHTML = "";
        const items = [
            { icon: "fa-plus-circle", text: "Nueva Solicitud", href: "solicitud.html", visible: true },
            { icon: "fa-list", text: "Ver Solicitudes", href: "consulta.html", visible: true }
        ];
        if (role === "tecnico" || role === "supervisor" || role === "admin") {
            items.push({ icon: "fa-chart-line", text: "Informes", href: "informes.html", visible: true });
        }
        if (role === "supervisor" || role === "admin") {
            items.push({ icon: "fa-gears", text: "Gestionar Equipos", href: "gestion_equipos.html", visible: true });
            items.push({ icon: "fa-location-dot", text: "Gestionar Ubicaciones", href: "gestion_ubicaciones.html", visible: true });
        }
        if (role === "admin") {
            items.push({ icon: "fa-users", text: "Gestionar Usuarios", href: "gestion_usuarios.html", visible: true });
        }
        items.forEach(item => {
            const div = document.createElement("div");
            div.className = "nav-item";
            div.innerHTML = `<i class="fas ${item.icon}"></i><span>${item.text}</span>`;
            div.onclick = () => location.href = item.href;
            nav.appendChild(div);
        });
    }

    // ==================== CARGAR DATOS ====================
    async function cargarTecnicos() {
        const usersSnap = await getDocs(collection(db, "users"));
        listaTecnicos = [];
        usersSnap.forEach(docSnap => {
            const data = docSnap.data();
            if (data.rol === "tecnico" || data.rol === "admin") {
                listaTecnicos.push({ uid: docSnap.id, nombre: data.nombreCompleto || data.email });
            }
        });
        listaTecnicos.sort((a,b) => a.nombre.localeCompare(b.nombre));
    }

    async function cargarListasFiltros() {
        const usersSnap = await getDocs(collection(db, "users"));
        const selectUsuario = document.getElementById("filtroUsuario");
        selectUsuario.innerHTML = '<option value="">Todos</option>';
        usersSnap.forEach(docSnap => {
            const data = docSnap.data();
            const nombre = data.nombreCompleto || data.email;
            const opt = document.createElement("option");
            opt.value = nombre;
            opt.textContent = nombre;
            selectUsuario.appendChild(opt);
        });

        const ubicacionesSnap = await getDocs(collection(db, "ubicaciones"));
        const selectUbicacion = document.getElementById("filtroUbicacion");
        selectUbicacion.innerHTML = '<option value="">Todas</option>';
        ubicacionesSnap.forEach(docSnap => {
            const opt = document.createElement("option");
            opt.value = docSnap.data().nombre;
            opt.textContent = docSnap.data().nombre;
            selectUbicacion.appendChild(opt);
        });

        const equiposSnap = await getDocs(collection(db, "equipos"));
        const selectEquipo = document.getElementById("filtroEquipo");
        selectEquipo.innerHTML = '<option value="">Todos</option>';
        equiposSnap.forEach(docSnap => {
            const opt = document.createElement("option");
            opt.value = docSnap.data().nombre;
            opt.textContent = docSnap.data().nombre;
            selectEquipo.appendChild(opt);
        });
    }

    async function cargarTodasOrdenes() {
        const querySnapshot = await getDocs(collection(db, "ordenes"));
        todasOrdenes = [];
        querySnapshot.forEach(docSnap => {
            todasOrdenes.push({ id: docSnap.id, ...docSnap.data() });
        });
    }

    function configurarOrdenPredeterminado() {
        const campoOrden = document.getElementById("ordenCampo");
        const direccionOrden = document.getElementById("ordenDireccion");
        const filtroEstado = document.getElementById("filtroEstado");
        if (userRole === "tecnico" || userRole === "admin") {
            campoOrden.value = "fechaProgramada";
            direccionOrden.value = "asc";
            filtroEstado.value = "noCerrado";
        } else {
            campoOrden.value = "numero";
            direccionOrden.value = "asc";
        }
    }

    // ==================== RENDER TABLA CON MENÚ ====================
    window.cargar = async function() {
        const tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        const busqueda = document.getElementById("busqueda").value.toLowerCase();
        const tipo = document.getElementById("filtroTipo").value;
        const estado = document.getElementById("filtroEstado").value;
        const usuario = document.getElementById("filtroUsuario").value;
        const ubicacion = document.getElementById("filtroUbicacion").value;
        const equipo = document.getElementById("filtroEquipo").value;

        const ordenCampo = document.getElementById("ordenCampo").value;
        const ordenDireccion = document.getElementById("ordenDireccion").value;

        let filtradas = todasOrdenes.filter(orden => {
            if (busqueda) {
                const coincideNumero = orden.numeroOrden?.toLowerCase().includes(busqueda);
                const coincideUbicacion = orden.ubicacion?.toLowerCase().includes(busqueda);
                const coincideEquipo = orden.equipo?.toLowerCase().includes(busqueda);
                if (!coincideNumero && !coincideUbicacion && !coincideEquipo) return false;
            }
            if (tipo && orden.tipo !== tipo) return false;
            if (estado === "noCerrado") {
                if (orden.estado === "Cerrado") return false;
            } else if (estado && orden.estado !== estado) return false;
            if (usuario && orden.solicitante !== usuario) return false;
            if (ubicacion && orden.ubicacion !== ubicacion) return false;
            if (equipo && orden.equipo !== equipo) return false;
            return true;
        });

        filtradas.sort((a, b) => {
            let valA, valB;
            if (ordenCampo === "numero") {
                const numA = parseInt(a.numeroOrden.split('-')[1]) || 0;
                const numB = parseInt(b.numeroOrden.split('-')[1]) || 0;
                valA = numA;
                valB = numB;
            } else {
                valA = a.fechaProgramada ? a.fechaProgramada.seconds : 0;
                valB = b.fechaProgramada ? b.fechaProgramada.seconds : 0;
            }
            if (ordenDireccion === "asc") return valA - valB;
            else return valB - valA;
        });

        filtradas.forEach(orden => {
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td>${orden.numeroOrden}</td>
                <td>${orden.tipo}</td>
                <td>${orden.estado}</td>
                <td>${orden.equipo}</td>
                <td>${orden.descripcion}</td>
                <td class="actions-menu">
                    <div class="menu-trigger" data-id="${orden.id}"><i class="fas fa-ellipsis-v"></i></div>
                    <div class="dropdown-menu" data-id="${orden.id}"></div>
                </td>
            `;
            tabla.appendChild(fila);
        });

        // Agregar eventos a los menús
        document.querySelectorAll('.menu-trigger').forEach(trigger => {
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = trigger.getAttribute('data-id');
                const menu = trigger.parentElement.querySelector('.dropdown-menu');
                // Cerrar cualquier otro menú abierto
                document.querySelectorAll('.dropdown-menu.show').forEach(m => {
                    if (m !== menu) m.classList.remove('show');
                });
                if (menu.classList.contains('show')) {
                    menu.classList.remove('show');
                } else {
                    // Llenar menú según rol y estado
                    const orden = todasOrdenes.find(o => o.id === id);
                    menu.innerHTML = '';
                    const addOption = (text, onClick) => {
                        const btn = document.createElement('button');
                        btn.textContent = text;
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            onClick();
                            menu.classList.remove('show');
                        };
                        menu.appendChild(btn);
                    };
                    addOption('Ver detalles', () => verDetalles(id));
                    if (userRole !== 'usuario') {
                        // Verificar si está cerrada y rol no admin
                        if (orden.estado === 'Cerrado' && userRole !== 'admin') {
                            addOption('Editar (solo admin)', () => alert('Solo administradores pueden editar órdenes cerradas.'));
                        } else {
                            addOption('Editar', () => abrirModal(id));
                        }
                    }
                    if (userRole === 'admin') {
                        addOption('Eliminar', () => eliminarOrden(id));
                    }
                    menu.classList.add('show');
                }
            });
        });

        // Cerrar menús al hacer clic fuera
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.actions-menu')) {
                document.querySelectorAll('.dropdown-menu.show').forEach(menu => menu.classList.remove('show'));
            }
        });
    }

    // ==================== INICIALIZACIÓN ====================
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        userRole = sessionStorage.getItem("userRole") || "usuario";
        const userName = sessionStorage.getItem("userName") || user.email;
        document.getElementById("userName").innerText = userName;
        document.getElementById("userRole").innerText = userRole.charAt(0).toUpperCase() + userRole.slice(1);
        const avatarInitial = userName.charAt(0).toUpperCase();
        document.getElementById("userAvatar").innerText = avatarInitial;
        generarSidebar(userRole);
        await cargarListasFiltros();
        await cargarTecnicos();
        await cargarTodasOrdenes();
        configurarOrdenPredeterminado();
        cargar();
    });

    document.getElementById("filtrarBtn").addEventListener("click", () => cargar());
    document.getElementById("aplicarOrdenBtn").addEventListener("click", () => cargar());
    document.getElementById("exportBtn").addEventListener("click", () => exportarCSV());
    document.getElementById("busqueda").addEventListener("input", () => cargar());
    document.getElementById("logoutBtn").addEventListener("click", async () => {
        await signOut(auth);
        sessionStorage.clear();
        window.location.href = "login.html";
    });
    
    window.eliminarOrden = async function(id) {
        if (!confirm("¿Está seguro de eliminar esta orden? Esta acción no se puede deshacer.")) return;
        try {
            await deleteDoc(doc(db, "ordenes", id));
            await cargarTodasOrdenes();
            cargar();
            alert("Orden eliminada.");
        } catch(e) {
            alert("Error al eliminar: " + e.message);
        }
    }

    window.exportarCSV = function() {
        // Exportar todas las órdenes (sin filtrar)
        const ordenes = todasOrdenes;
        if (ordenes.length === 0) {
            alert("No hay órdenes para exportar.");
            return;
        }
        // Definir cabeceras
        const headers = [
            "N° Orden", "Tipo", "Estado", "Solicitante", "Ubicación", "Equipo",
            "Descripción", "Prioridad", "Fecha Creación", "Fecha Programada", "Fecha Cierre",
            "Técnico Asignado", "Tiempo Estimado (hs)", "Tiempo Real (hs)",
            "Comentario Mantenimiento", "Informe Cierre", "Frecuencia", "Tiempo en Espera (min)"
        ];
        const rows = ordenes.map(o => [
            o.numeroOrden,
            o.tipo,
            o.estado,
            o.solicitante,
            o.ubicacion,
            o.equipo,
            o.descripcion,
            o.prioridad,
            o.fechaCreacion ? new Date(o.fechaCreacion.seconds*1000).toLocaleString() : "",
            o.fechaProgramada ? new Date(o.fechaProgramada.seconds*1000).toLocaleString() : "",
            o.fechaCierre ? new Date(o.fechaCierre.seconds*1000).toLocaleString() : "",
            o.tecnicoAsignado || "",
            o.tiempoEstimado ?? "",
            o.tiempoReal ?? "",
            o.comentarioMantenimiento || "",
            o.informeCierre || "",
            o.frecuencia || "",
            o.tiempoTotalEspera || 0
        ]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "ordenes_mantenimiento.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    };

    window.verDetalles = async function(id) {
        const snap = await getDoc(doc(db, "ordenes", id));
        if (!snap.exists()) return;
        const d = snap.data();
        const formatFecha = (ts) => ts ? new Date(ts.seconds*1000).toLocaleString() : 'N/A';
        
        // Formatear historial
        let historialHtml = '<table style="width:100%; border-collapse:collapse; margin-top:5px;">';
        historialHtml += '<tr><th>Fecha</th><th>Estado</th><th>Usuario</th></tr>';
        if (d.historial && d.historial.length) {
            d.historial.forEach(h => {
                historialHtml += `<tr>
                    <td>${h.fecha ? new Date(h.fecha.seconds*1000).toLocaleString() : 'N/A'}</td>
                    <td>${h.estado}</td>
                    <td>${h.usuario || ''}</td>
                </tr>`;
            });
        } else {
            historialHtml += '<tr><td colspan="3">No hay historial</td></tr>';
        }
        historialHtml += '</table>';
        
        document.getElementById("detallesContenido").innerHTML = `
            <div class="detalle-linea"><span class="detalle-label">N° Orden:</span> ${d.numeroOrden}</div>
            <div class="detalle-linea"><span class="detalle-label">Tipo:</span> ${d.tipo}</div>
            <div class="detalle-linea"><span class="detalle-label">Estado:</span> ${d.estado}</div>
            <div class="detalle-linea"><span class="detalle-label">Solicitante:</span> ${d.solicitante}</div>
            <div class="detalle-linea"><span class="detalle-label">Ubicación:</span> ${d.ubicacion}</div>
            <div class="detalle-linea"><span class="detalle-label">Equipo:</span> ${d.equipo}</div>
            <div class="detalle-linea"><span class="detalle-label">Descripción:</span> ${d.descripcion}</div>
            <div class="detalle-linea"><span class="detalle-label">Prioridad:</span> ${d.prioridad}</div>
            <div class="detalle-linea"><span class="detalle-label">Fecha creación:</span> ${formatFecha(d.fechaCreacion)}</div>
            <div class="detalle-linea"><span class="detalle-label">Fecha programada:</span> ${formatFecha(d.fechaProgramada)}</div>
            <div class="detalle-linea"><span class="detalle-label">Fecha cierre:</span> ${formatFecha(d.fechaCierre)}</div>
            <div class="detalle-linea"><span class="detalle-label">Técnico asignado:</span> ${d.tecnicoAsignado || 'No'}</div>
            <div class="detalle-linea"><span class="detalle-label">Tiempo estimado (hs):</span> ${d.tiempoEstimado ?? 'N/A'}</div>
            <div class="detalle-linea"><span class="detalle-label">Tiempo real (hs):</span> ${d.tiempoReal ?? 'N/A'}</div>
            <div class="detalle-linea"><span class="detalle-label">Comentario:</span> ${d.comentarioMantenimiento || 'Ninguno'}</div>
            <div class="detalle-linea"><span class="detalle-label">Informe cierre:</span> ${d.informeCierre || 'No'}</div>
            <div class="detalle-linea"><span class="detalle-label">Frecuencia:</span> ${d.frecuencia || 'N/A'}</div>
            <div class="detalle-linea"><span class="detalle-label">Tiempo en espera (min):</span> ${d.tiempoTotalEspera || 0}</div>
            <div class="detalle-linea"><span class="detalle-label">Historial:</span></div>
            <div>${historialHtml}</div>
        `;
        document.getElementById("modalDetalles").style.display = "block";
    }

    window.abrirModal = async function(id) {
        if (userRole === "usuario") { alert("Sin permisos"); return; }
        const docRef = doc(db, "ordenes", id);
        const snap = await getDoc(docRef);
        if (!snap.exists()) return;
        const data = snap.data();
        if (data.estado === "Cerrado" && userRole !== "admin") {
            alert("Solo un administrador puede modificar órdenes cerradas.");
            return;
        }
        currentOrderId = id;
        document.getElementById("editId").value = id;
        const selectEstado = document.getElementById("editEstado");
        selectEstado.innerHTML = "";
        const estados = ["Nuevo","Pendiente","En proceso","Esperando proveedor","Cerrado"];
        estados.forEach(est => { let opt = document.createElement("option"); opt.value=est; opt.textContent=est; if(est===data.estado) opt.selected=true; selectEstado.appendChild(opt); });
        const divInforme = document.getElementById("divInformeCierre");
        divInforme.style.display = (data.estado === "Cerrado") ? "block" : "none";
        document.getElementById("editInformeCierre").value = data.informeCierre || "";
        selectEstado.onchange = () => { divInforme.style.display = (selectEstado.value === "Cerrado") ? "block" : "none"; };
        
        // Cargar técnicos en select
        const selectTecnico = document.getElementById("editTecnico");
        selectTecnico.innerHTML = '<option value="">Seleccionar técnico</option>';
        listaTecnicos.forEach(tec => {
            const opt = document.createElement("option");
            opt.value = tec.nombre;
            opt.textContent = tec.nombre;
            if (tec.nombre === data.tecnicoAsignado) opt.selected = true;
            selectTecnico.appendChild(opt);
        });
        
        if(data.fechaProgramada) { let fecha = new Date(data.fechaProgramada.seconds*1000); document.getElementById("editFechaProgramada").value = fecha.toISOString().slice(0,16); }
        else document.getElementById("editFechaProgramada").value = "";
        document.getElementById("editTiempoEstimado").value = data.tiempoEstimado || "";
        document.getElementById("editTiempoReal").value = data.tiempoReal || "";
        document.getElementById("editComentario").value = data.comentarioMantenimiento || "";
        const divAccion = document.getElementById("accionEspera");
        divAccion.innerHTML = "";
        if (data.estado === "Esperando proveedor") {
            let btn = document.createElement("button");
            btn.textContent = "Salir de espera (volver a Pendiente)";
            btn.onclick = () => salirEspera(id);
            divAccion.appendChild(btn);
        }
        document.getElementById("modalEditar").style.display = "block";
    }

    window.salirEspera = async function(id) {
        const docRef = doc(db, "ordenes", id);
        const snap = await getDoc(docRef);
        if (!snap.exists()) return;
        const data = snap.data();
        const inicio = data.fechaInicioEspera;
        if(inicio){
            const diffMin = Math.floor((new Date() - inicio.toDate())/60000);
            const nuevoTotal = (data.tiempoTotalEspera||0) + diffMin;
            await updateDoc(docRef, { estado: "Pendiente", fechaInicioEspera: null, tiempoTotalEspera: nuevoTotal });
        } else await updateDoc(docRef, { estado: "Pendiente" });
        cerrarModal('modalEditar');
        await cargarTodasOrdenes();
        cargar();
    }

    window.guardarEdicion = async function() {
        const id = document.getElementById("editId").value;
        const nuevoEstado = document.getElementById("editEstado").value;
        const tecnico = document.getElementById("editTecnico").value;
        const fechaProgramada = document.getElementById("editFechaProgramada").value;
        const tiempoEstimado = parseFloat(document.getElementById("editTiempoEstimado").value);
        let tiempoReal = parseFloat(document.getElementById("editTiempoReal").value);
        const comentario = document.getElementById("editComentario").value;
        const informeCierre = document.getElementById("editInformeCierre").value;

        const docRef = doc(db, "ordenes", id);
        const snap = await getDoc(docRef);
        if (!snap.exists()) return;
        const data = snap.data();

        if (nuevoEstado === "Cerrado") {
            if (!informeCierre.trim()) return alert("El informe de cierre es obligatorio.");
            if (isNaN(tiempoReal) || tiempoReal <= 0) return alert("El tiempo real (horas) es obligatorio y debe ser mayor a 0.");
        }

        let updateData = {
            tecnicoAsignado: tecnico,
            tiempoEstimado: isNaN(tiempoEstimado)? null : tiempoEstimado,
            tiempoReal: isNaN(tiempoReal)? null : tiempoReal,
            comentarioMantenimiento: comentario,
            informeCierre: informeCierre
        };
        if (fechaProgramada) updateData.fechaProgramada = new Date(fechaProgramada);

        if (nuevoEstado !== data.estado) {
            updateData.estado = nuevoEstado;
            const historial = data.historial || [];
            historial.push({ estado: nuevoEstado, fecha: new Date(), usuario: sessionStorage.getItem("userName") });
            updateData.historial = historial;

            if (nuevoEstado === "Cerrado") {
                updateData.fechaCierre = new Date();
                if (data.tipo === "Preventivo" && data.frecuencia) await generarPreventivaRecurrente(data);
            }
            if (nuevoEstado === "Esperando proveedor") updateData.fechaInicioEspera = new Date();
            else if (data.estado === "Esperando proveedor" && nuevoEstado !== "Esperando proveedor") {
                const inicio = data.fechaInicioEspera;
                if (inicio) {
                    const diffMin = Math.floor((new Date() - inicio.toDate())/60000);
                    updateData.tiempoTotalEspera = (data.tiempoTotalEspera||0) + diffMin;
                    updateData.fechaInicioEspera = null;
                }
            }
        }
        await updateDoc(docRef, updateData);
        await cargarTodasOrdenes();
        cerrarModal('modalEditar');
        cargar();
    }

    async function generarPreventivaRecurrente(original) {
        let nuevaFecha = new Date();
        switch(original.frecuencia){
            case "Diaria": nuevaFecha.setDate(nuevaFecha.getDate()+1); break;
            case "Semanal": nuevaFecha.setDate(nuevaFecha.getDate()+7); break;
            case "Quincenal": nuevaFecha.setDate(nuevaFecha.getDate()+15); break;
            case "Mensual": nuevaFecha.setMonth(nuevaFecha.getMonth()+1); break;
            case "Bimestral": nuevaFecha.setMonth(nuevaFecha.getMonth()+2); break;
            case "Trimestral": nuevaFecha.setMonth(nuevaFecha.getMonth()+3); break;
            case "Semestral": nuevaFecha.setMonth(nuevaFecha.getMonth()+6); break;
            case "Anual": nuevaFecha.setFullYear(nuevaFecha.getFullYear()+1); break;
            default: return;
        }
        const refCont = doc(db, "config", "contador");
        const snapCont = await getDoc(refCont);
        let cont = snapCont.data();
        let nuevoNumero;
        if(original.tipo === "Correctivo"){ nuevoNumero = "OMC-" + String(cont.contadorOMC).padStart(4,"0"); await updateDoc(refCont, { contadorOMC: cont.contadorOMC+1 }); }
        else { nuevoNumero = "OMP-" + String(cont.contadorOMP).padStart(4,"0"); await updateDoc(refCont, { contadorOMP: cont.contadorOMP+1 }); }
        const nuevaOrden = { ...original, numeroOrden: nuevoNumero, estado: "Nuevo", fechaCreacion: new Date(), fechaProgramada: nuevaFecha, fechaCierre: null, tiempoReal: null, comentarioMantenimiento: "", informeCierre: "", fechaInicioEspera: null, tiempoTotalEspera: 0, historial: [{ estado: "Nuevo", fecha: new Date(), usuario: "Sistema" }] };
        delete nuevaOrden.id;
        await addDoc(collection(db, "ordenes"), nuevaOrden);
    }

    window.cerrarModal = (id) => document.getElementById(id).style.display = "none";
    window.logout = async () => { await signOut(auth); sessionStorage.clear(); window.location.href = "login.html"; }
</script>
