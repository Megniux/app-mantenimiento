<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Inicio - Sistema de Mantenimiento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .menu-buttons button {
            padding: 15px 25px;
            font-size: 1rem;
            min-width: 180px;
        }
        @media (max-width: 600px) {
            .menu-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <img src="logo.jpg" class="logo">
        <h1>Sistema de Mantenimiento</h1>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
</div>
<div class="container" id="menuContainer">
    <!-- Botones dinámicos según rol -->
</div>
<div class="footer">
    <div class="footer-content">
        <i class="fa-solid fa-phone phone-icon"></i>
        <span>+54 9 11 2765 6821</span>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
        authDomain: "mantenimiento-app-170e5.firebaseapp.com",
        projectId: "mantenimiento-app-170e5",
        storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
        messagingSenderId: "555398253444",
        appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        const role = sessionStorage.getItem("userRole") || "usuario";
        generarMenu(role);
    });

    window.logout = async function() {
        await signOut(auth);
        sessionStorage.clear();
        window.location.href = "login.html";
    }

    function generarMenu(role) {
        const container = document.getElementById("menuContainer");
        container.innerHTML = '<div class="menu-buttons"></div>';
        const menuDiv = container.querySelector(".menu-buttons");

        const btnNueva = document.createElement("button");
        btnNueva.textContent = "Nueva Solicitud";
        btnNueva.onclick = () => location.href = "solicitud.html";
        menuDiv.appendChild(btnNueva);

        const btnConsultas = document.createElement("button");
        btnConsultas.textContent = "Ver Solicitudes";
        btnConsultas.onclick = () => location.href = "consulta.html";
        menuDiv.appendChild(btnConsultas);

        if (role === "tecnico" || role === "supervisor" || role === "admin") {
            const btnInformes = document.createElement("button");
            btnInformes.textContent = "Informes";
            btnInformes.onclick = () => location.href = "informes.html";
            menuDiv.appendChild(btnInformes);
        }

        if (role === "supervisor" || role === "admin") {
            const btnEquipos = document.createElement("button");
            btnEquipos.textContent = "Gestionar Equipos";
            btnEquipos.onclick = () => location.href = "gestion_equipos.html";
            menuDiv.appendChild(btnEquipos);

            const btnUbicaciones = document.createElement("button");
            btnUbicaciones.textContent = "Gestionar Ubicaciones";
            btnUbicaciones.onclick = () => location.href = "gestion_ubicaciones.html";
            menuDiv.appendChild(btnUbicaciones);
        }

        if (role === "admin") {
            const btnUsuarios = document.createElement("button");
            btnUsuarios.textContent = "Gestionar Usuarios";
            btnUsuarios.onclick = () => location.href = "gestion_usuarios.html";
            menuDiv.appendChild(btnUsuarios);
        }
    }
</script>
</body>
</html>
