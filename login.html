<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Sistema de Mantenimiento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <img src="logo.jpg" alt="Logo" class="logo">
        <h1>Sistema de Mantenimiento</h1>
    </div>
</div>
<div class="container" style="background: transparent; box-shadow: none;">
    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        <input type="email" id="email" placeholder="Email" autocomplete="off">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()" style="width: 100%; margin-top: 15px;">Ingresar</button>
    </div>
</div>
<div class="footer">
    <div class="footer-content">
        <i class="fa-solid fa-phone phone-icon"></i>
        <span>+54 9 11 2765 6821</span>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
        authDomain: "mantenimiento-app-170e5.firebaseapp.com",
        projectId: "mantenimiento-app-170e5",
        storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
        messagingSenderId: "555398253444",
        appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.login = async function() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                sessionStorage.setItem("userName", userData.nombreCompleto);
                sessionStorage.setItem("userRole", userData.rol);
                sessionStorage.setItem("userUid", uid);
            } else {
                sessionStorage.setItem("userName", email);
                sessionStorage.setItem("userRole", "usuario");
                sessionStorage.setItem("userUid", uid);
            }
            window.location.href = "index.html";
        } catch (e) {
            alert("Error de login: " + e.message);
        }
    }
</script>
</body>
</html>
