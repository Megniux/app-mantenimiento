<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nueva Solicitud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-card {
            max-width: 600px;
            margin: 0 auto;
        }
        .input-with-icon {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 0 10px;
            background: white;
        }
        .input-with-icon i {
            color: #1f3a5f;
            margin-right: 8px;
        }
        .input-with-icon input,
        .input-with-icon select {
            border: none;
            outline: none;
            padding: 10px 0;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.jpg" alt="Logo" class="sidebar-logo">
            <h2>Mantenimiento</h2>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
            <!-- Los enlaces se generan dinámicamente según rol -->
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar"></div>
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-role" id="userRole"></div>
                </div>
            </div>
            <button class="logout-btn-sidebar" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title" style="padding: 10px 0;">
                <h1>Inicio</h1>
            </div>
        </div>
        <div class="form-card" style="padding: 40px;">
            <h2><i class="fa-solid fa-file-circle-plus"></i> Solicitud de Mantenimiento</h2>
            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="solicitante" disabled>
                </div>
            </div>
            <div class="form-group" id="tipoGrupo">
                <div class="input-with-icon">
                    <i class="fa-solid fa-list"></i>
                    <select id="tipo" onchange="mostrarFrecuencia()">
                        <option value="Correctivo">Correctivo</option>
                        <option value="Preventivo">Preventivo</option>
                    </select>
                </div>
            </div>
            <div class="form-group" id="grupoFrecuencia" style="display:none;">
                <div class="input-with-icon">
                    <i class="fa-solid fa-repeat"></i>
                    <select id="frecuencia">
                        <option value="">Seleccionar frecuencia</option>
                        <option>Diaria</option><option>Semanal</option><option>Quincenal</option>
                        <option>Mensual</option><option>Bimestral</option><option>Trimestral</option>
                        <option>Semestral</option><option>Anual</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <select id="ubicacion"><option>Cargando...</option></select>
                </div>
            </div>
            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fa-solid fa-gears"></i>
                    <select id="equipo"><option>Cargando...</option></select>
                </div>
            </div>
            <div class="form-group">
                <textarea id="descripcion" placeholder="Descripción del problema o tarea" rows="3"></textarea>
            </div>
            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fa-solid fa-flag"></i>
                    <select id="prioridad">
                        <option>Baja</option><option selected>Media</option><option>Alta</option>
                    </select>
                </div>
            </div>
            <button onclick="guardar()" class="btn-primary" style="width:100%"><i class="fa-solid fa-paper-plane"></i> Enviar solicitud</button>
        </div>
    </main>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
        authDomain: "mantenimiento-app-170e5.firebaseapp.com",
        projectId: "mantenimiento-app-170e5",
        storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
        messagingSenderId: "555398253444",
        appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    async function cargarOpciones() {
        const ubicacionesSnap = await getDocs(collection(db, "ubicaciones"));
        const ubicacionSelect = document.getElementById("ubicacion");
        ubicacionSelect.innerHTML = '<option value="">Seleccionar ubicación</option>';
        ubicacionesSnap.forEach(doc => {
            const opt = document.createElement("option");
            opt.value = doc.data().nombre;
            opt.textContent = doc.data().nombre;
            ubicacionSelect.appendChild(opt);
        });
        const equiposSnap = await getDocs(collection(db, "equipos"));
        const equipoSelect = document.getElementById("equipo");
        equipoSelect.innerHTML = '<option value="">Seleccionar equipo</option>';
        equiposSnap.forEach(doc => {
            const opt = document.createElement("option");
            opt.value = doc.data().nombre;
            opt.textContent = doc.data().nombre;
            equipoSelect.appendChild(opt);
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        const uid = user.uid;
        const userDoc = await getDoc(doc(db, "users", uid));
        let nombre = user.email;
        if (userDoc.exists()) nombre = userDoc.data().nombreCompleto || user.email;
        document.getElementById("solicitante").value = nombre;
        sessionStorage.setItem("userName", nombre);
        sessionStorage.setItem("userUid", uid);
        
        // Ocultar tipo si es usuario
        const role = sessionStorage.getItem("userRole") || "usuario";
        const tipoGrupo = document.getElementById("tipoGrupo");
        if (role === "usuario") {
            tipoGrupo.style.display = "none";
            document.getElementById("tipo").value = "Correctivo";
            document.getElementById("grupoFrecuencia").style.display = "none";
        }
        
        cargarOpciones();
    });

    window.mostrarFrecuencia = function() {
        const tipo = document.getElementById("tipo").value;
        document.getElementById("grupoFrecuencia").style.display = (tipo === "Preventivo") ? "block" : "none";
    }

    async function generarNumero(tipo) {
        const ref = doc(db, "config", "contador");
        const snap = await getDoc(ref);
        let data = snap.data();
        let numero;
        if (tipo === "Correctivo") {
            numero = "OMC-" + String(data.contadorOMC).padStart(4, "0");
            await updateDoc(ref, { contadorOMC: data.contadorOMC + 1 });
        } else {
            numero = "OMP-" + String(data.contadorOMP).padStart(4, "0");
            await updateDoc(ref, { contadorOMP: data.contadorOMP + 1 });
        }
        return numero;
    }

    window.guardar = async function() {
        const solicitante = document.getElementById("solicitante").value;
        const tipo = document.getElementById("tipo").value;
        const ubicacion = document.getElementById("ubicacion").value;
        const equipo = document.getElementById("equipo").value;
        const descripcion = document.getElementById("descripcion").value;
        const prioridad = document.getElementById("prioridad").value;
        const frecuencia = document.getElementById("frecuencia").value;
        const uid = sessionStorage.getItem("userUid");
        if (!ubicacion || !equipo || !descripcion) return alert("Complete todos los campos.");
        try {
            const numeroOrden = await generarNumero(tipo);
            await addDoc(collection(db, "ordenes"), {
                numeroOrden, tipo, estado: "Nuevo", fechaCreacion: new Date(),
                fechaProgramada: null, fechaCierre: null, solicitante, solicitanteUid: uid,
                ubicacion, equipo, descripcion, prioridad,
                frecuencia: tipo === "Preventivo" ? frecuencia : "",
                tecnicoAsignado: "", tiempoEstimado: null, tiempoReal: null,
                comentarioMantenimiento: "", informeCierre: "",
                fechaInicioEspera: null, tiempoTotalEspera: 0,
                historial: [{ estado: "Nuevo", fecha: new Date(), usuario: solicitante }]
            });
            alert("Orden creada: " + numeroOrden);
            location.reload();
        } catch(e) { alert("Error: " + e.message); }
    }

    window.logout = async function() { await signOut(auth); sessionStorage.clear(); location.href = "login.html"; }
</script>
</body>
</html>
