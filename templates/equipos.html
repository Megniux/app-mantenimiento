<div class="form-card">
  <div class="form-section" style="overflow-x:auto;">
    <h3>Lista de Equipos</h3>
    <table id="tablaEquipos" class="management-table">
      <colgroup>
        <col class="col-nombre">
        <col class="col-nombre">
        <col class="col-acciones">
      </colgroup>
      <thead>
        <tr>
          <th>Equipo</th>
          <th>Ubicaciones</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="form-section">
    <h3>Agregar nuevo equipo</h3>
    <div class="form-group">
      <div class="input-with-icon">
        <i class="fa-solid fa-gears"></i>
        <input type="text" id="nuevoEquipo" placeholder="Nombre del equipo">
      </div>
    </div>
    <div class="form-group">
      <label>Ubicaciones</label>
      <div id="checkboxUbicaciones" class="checkbox-ubicaciones"></div>
    </div>
  </div>
  <button id="agregarEquipoBtn" type="button" class="btn-primary"><i class="fa-solid fa-paper-plane"></i>Agregar</button>
</div>
