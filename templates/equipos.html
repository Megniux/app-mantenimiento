<div class="form-card">
  <div class="form-section" style="overflow-x:auto;">
    <h3>Lista de Equipos</h3>
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="busquedaEquipos" placeholder="Buscar...">
    </div>
    <table id="tablaEquipos" class="management-table">
      <colgroup>
        <col class="col-nombre">
        <col class="col-nombre">
        <col class="col-acciones">
      </colgroup>
      <thead>
        <tr>
          <th>Equipo</th>
          <th>Ubicación actual</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="form-section">
    <h3>Agregar nuevo equipo</h3>
    <div class="form-group">
      <div class="input-with-icon">
        <i class="fa-solid fa-gears"></i>
        <input type="text" id="nuevoEquipo" placeholder="Nombre del equipo">
      </div>
    </div>
    <div class="form-group">
      <div class="input-with-icon">
        <i class="fa-solid fa-location-dot"></i>
        <select id="ubicacionEquipo">
          <option value="">Seleccionar ubicación</option>
        </select>
      </div>
    </div>
  </div>
  <button id="agregarEquipoBtn" type="button" class="btn-primary"><i class="fa-solid fa-paper-plane"></i>Agregar</button>
</div>

<div id="modalMoverEquipo" class="modal is-hidden"><div class="modal-content">
  <span class="close close-modal" data-modal="modalMoverEquipo">&times;</span>
  <div class="form-card modal-form-card form-section">
    <h3>Cambiar Ubicación</h3>
    <div id="equipoMoverResumen" class="detalle-linea"></div>
    <div class="form-group">
      <div class="input-with-icon">
        <i class="fa-solid fa-location-dot"></i>
        <select id="moverEquipoUbicacion">
          <option value="">Seleccionar ubicación</option>
        </select>
      </div>
    </div>
    <button id="guardarCambioUbicacionBtn" type="button" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i>Guardar cambio</button>
  </div>
</div></div>
