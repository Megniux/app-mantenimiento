<div class="view-wrapper">
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="off" required>
      <input type="password" id="loginPassword" placeholder="Contraseña" required>
      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
    <button type="button" id="forgotPasswordLink" class="link-button">¿Olvidaste tu contraseña?</button>
    <p id="loginMessage" class="login-message" aria-live="polite"></p>
  </div>
</div>
