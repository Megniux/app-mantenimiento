<div class="form-card">
  <h2><i class="fa-solid fa-file-circle-plus"></i> Solicitud de Mantenimiento</h2>
  <form id="solicitudForm">
    <div class="form-section">
      <h3>Datos generales</h3>
      <div class="form-group">
        <div class="input-with-icon">
          <i class="fa-solid fa-list"></i>
          <input type="text" id="solicitante" disabled>
        </div>
      </div>
    </div>   
    <div class="form-group" id="tipoGrupo"><select id="tipo"><option value="Correctivo">Correctivo</option><option value="Preventivo">Preventivo</option></select></div>
    <div class="form-group" id="grupoFrecuencia" style="display:none;"><select id="frecuencia"><option value="">Seleccionar frecuencia</option><option>Diaria</option><option>Semanal</option><option>Quincenal</option><option>Mensual</option><option>Bimestral</option><option>Trimestral</option><option>Semestral</option><option>Anual</option></select></div>
    <div class="form-group"><i class="fa-solid fa-location-dot"></i><select id="ubicacion"><option>Cargando...</option></select></div>
    <div class="form-group"><select id="equipo"><option>Cargando...</option></select></div>
    <div class="form-group"><textarea id="descripcion" placeholder="Descripción del problema o tarea" rows="3"></textarea></div>
    <div class="form-group"><select id="prioridad"><option>Baja</option><option selected>Media</option><option>Alta</option></select></div>
    <button id="guardarSolicitudBtn" type="button" class="btn-primary">Enviar solicitud</button>
  </form>
</div>
