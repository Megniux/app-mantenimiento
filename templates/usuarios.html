<div class="container">
  <h2>Lista de Usuarios</h2>
  <table id="tablaUsuarios"><thead><tr><th>Email</th><th>Nombre</th><th>Rol</th><th>Acciones</th></tr></thead><tbody></tbody></table>
  <div class="card" style="padding: 12px;">
    <h3>Crear nuevo usuario</h3>
    <div class="form-group"><input type="email" id="email" placeholder="Email"></div>
    <div class="form-group"><input type="text" id="nombre" placeholder="Nombre completo"></div>
    <div class="form-group"><input type="password" id="password" placeholder="Contraseña"></div>
    <div class="form-group"><select id="rol"><option value="usuario">Usuario</option><option value="tecnico">Técnico</option><option value="supervisor">Supervisor</option><option value="admin">Administrador</option></select></div>
    <button id="crearUsuarioBtn">Crear usuario</button>
  </div>
</div>
